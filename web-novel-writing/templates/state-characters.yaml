# ============================================================
# 02 · 人物卡状态 (state-characters.yaml)
# ============================================================
# 含【慢变】(身份/伤口/弧线) + 【快变】(current_state，每章可能更新)。
# 铁律：
#  - 人设写【行为锚点】不写形容词。"很勇敢"模型无锚点必漂移；写
#    "七岁目睹父亲守诺被斩首，二十年未对任何人立誓" —— 可检索、可自检、可演。
#  - 必填【认知边界 cognition】：谁知道什么。这是防"角色说出他不该知道的信息"
#    和"AI 提前剧透"的核心（悬疑/马甲/重生流命门）。
#  - 爽文主角设计：可加【性格】瑕疵(惜命/毒舌/贪财)增记忆点；
#    但【能力/智商】缺陷(降智)、道德圣母 = 毒点不是弧线（见 references/09）。
# ============================================================

characters:
  - id: CHR_001
    name: ""
    role: ""                 # 主角 / 主要反派 / 重要配角 / 女主…
    identity: ""             # 一句话身份
    canon_status: Pending
    visible_from_volume: 1   # 这个角色/这层身份从第几卷起可在正文出现

    # ---- 慢变：核心设定 ----
    behavior_anchors:        # 行为锚点（具体事件，非形容词），2-4 条
      - ""
    flaw_personality: ""     # 性格瑕疵（增记忆点；不是能力/智商缺陷）
    voice_notes: ""          # 可演出的"声音"：口头禅/语速/第一人称/怎么称呼别人
    wound_lie_want_need: ""  # （可选,非爽文重弧线时填）伤口→谎言→渴望→需要 链
    arc: ""                  # 弧线：成长/平稳/堕落；爽文可弱化为"强且有趣"

    # ---- 快变：当前状态（state-updater 每章按 delta 增量回写）----
    current_state:
      location: ""           # 当前所在
      level: ""              # 当前境界/实力（对照 world.power_system.ladder，脚本校验不倒退）
      injury: ""             # 当前伤势/状态
      emotion: ""            # 当前情绪基调
      goal_now: ""           # 当前阶段目标
      resources:             # 资源账本（防"凭空出现"）。拆 items + balances 让 state_apply 能做
                             #   原子计数器合并（数值走 delta 累加，物品走 add/remove）。
        items: []            # 法宝/技能/债务/冷却（add/remove）
        balances: {}         # 数值资源，如 {灵石: 0, 贡献点: 0}（delta 累加，章级幂等保护）
      relations:             # 与其他角色的当前关系（随剧情演化）
        - with: ""           # 对方 id
          stage: ""          # 关系阶段（敌对/结盟/暧昧/师徒…）

    # ---- 认知边界（防剧透 + 防"说出不该知道的事" + 信息差/戏剧反讽）----
    cognition:
      knows: []              # 这个角色【已知】的关键信息
      does_not_know: []      # 这个角色【不知道】的关键信息（writer 不得让他表现得知道）
      misbeliefs: []         # 这个角色【错误地相信】什么（扮猪吃虎/打脸/反讽的命门——
                             #   别人误判主角废柴=他们的 misbelief；writer 据此写他们的反应）
      reader_knows_char_doesnt: []  # 读者已知但【角色不知】（戏剧反讽来源）
