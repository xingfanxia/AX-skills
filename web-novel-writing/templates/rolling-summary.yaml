# ============================================================
# 06 · 滚动摘要 (rolling-summary.yaml)
# ============================================================
# 分层递归记忆。替代 AX 原框架里单个 current_章节_memory.md（它要么丢早期细节、要么膨胀）。
# 原理：递归摘要 M_i = LLM(H_i, M_{i-1}) —— 章级一句话 + 最近 N 章压缩 + 上一章末段原文 + 卷级 + 全书主线。
# writer 的主要"短期记忆"来源是 previous_tail（上一章末段原文），防断点跳脱。
# 铁律：哪些事实必须进【永不压缩的结构化 canon】(01-05) vs 哪些可进【可压缩摘要】(本文件)——
#       关键设定/数值/伏笔进 canon；情节流水进摘要。压缩时先最大化召回，再提精度。
# ============================================================

# ---- 章级一句话摘要（每章一条，几乎不压缩）----
per_chapter:
  - ch: 0
    one_line: ""             # 这一章发生了什么（一句话）
    sao: ""                  # 本章兑现的爽点（对照排布表）
    hook: ""                 # 本章末钩子（供下一章承接）

# ---- 最近 N 章压缩摘要（滚动；进入每章 prompt 的"近况"层）----
compressed_recent: ""        # 最近约 3-5 章的压缩叙述（随章节滚动重写）

# ---- 上一章末段原文（writer 续写的直接锚点，防跳脱）----
previous_tail: ""            # 直接粘贴上一章最后一两段原文

# ---- 卷级摘要（每卷边界固化，进入跨卷 prompt）----
volume_summary:
  - volume: 1
    summary: ""

# ---- 全书主线摘要（极简，常驻；对齐契约 mainline_anchors）----
mainline_summary: ""
