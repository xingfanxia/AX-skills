# ============================================================
# 对标模块卡 EM-card (benchmark-module-card.yaml)
# ============================================================
# 拆对标爆款时，把"一个可复用的写法模块"抽成一张卡（借鉴 oh-story story-long-analyze）。
# 用法见 references/14-deconstruction-learning.md。核心是【防抄袭硬边界】：每张卡必须区分
# 「可替换项」(抽象成你自己的设定就能复用) vs「不可照搬」(照搬=融梗/抄袭，不学)。
# 数据来源：用户粘贴的章节/榜单/截图——本 skill 只消费结构化拆解，不抓站。
# ============================================================

module_card:
  id: EM_001
  source: ""               # 对标书名 + 章节定位（如《凡人修仙传》黄金三章）——用户提供
  module_type: ""          # 模块类型：开篇钩子 / 打脸编排 / 反转结构 / 金手指设计 / 情绪弧 / 钩子式…

  # ---- 抽象层：这个模块"为什么有效"（学这个，不是学表面）----
  mechanism: ""            # 一句话机制（如"先极致压抑+公开羞辱，再借第三方之口反转，放大围观震惊"）
  why_it_works: ""         # 戳中读者哪个心理（尊重感/优越感/认同感/期待感/信息差）

  # ---- 五步抽象法（从具体 → 可复用骨架）----
  abstract_steps:
    - ""                    # 1. 它具体写了什么
    - ""                    # 2. 剥掉题材外壳后的功能骨架
    - ""                    # 3. 哪个变量是"效果来源"
    - ""                    # 4. 换到你的设定里对应什么
    - ""                    # 5. 复用条件（什么品类/什么节点才适用）

  # ---- 防抄袭硬边界（最重要）----
  replaceable: []           # 【可替换项】：抽象成你自己的设定就能合法复用（结构/节奏/心理机制）
  do_not_copy: []           # 【不可照搬】：照搬=融梗/抄袭（具体设定/独特桥段/原文措辞/标志性梗）

  # ---- epistemic 纪律 ----
  confidence: ""            # high/medium/low——样本越少越低；样本<15 不许给 high
  notes: ""                 # ⚠️ 拿不准的标这里，不编造
