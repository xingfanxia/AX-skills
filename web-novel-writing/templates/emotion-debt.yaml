# ============================================================
# 05 · 情绪债账本 + 爽点排布 (emotion-debt.yaml)
# ============================================================
# AX 原框架完全缺失、必补的一层。把"爽感"从玄学变成可机检对象。
# 原理：爽点 = 安全感的社会延伸（尊重感→打脸 / 优越感→装逼 / 认同感）+ 期待感（条件反射）。
# 核心节奏 = 压抑-释放 / 情绪守恒：【释放强度必须 ≥ 已积累的憋屈债务】，
#           且"先打一巴掌再给甜枣"（先降期待再超预期解决）。
# 反模式：虐点无补偿、爽点免费（无铺垫直接爽）、压点写串（愤怒式打脸 vs 瞧不起式混用）。
# ============================================================

# ---- 情绪债账本：记录每条"憋屈/压抑"，要求有对应释放 ----
emotion_debts:
  - debt_id: D1
    text: ""                 # 什么憋屈/打压/误会/危机
    intensity: 0             # 憋屈强度 1-10
    incurred_ch: 0           # 在第几章积累
    duration_chapters: 0     # 已压抑多少章
    release_ch: 0            # 计划在第几章释放（打脸/翻盘/真相）
    release_intensity: 0     # 释放强度（必须 >= intensity，否则不解气）
    released: false

# ---- 爽点排布表（可机检密度；对照 references/07 的级别定义）----
# 工业刻度参考：每章≥1小爽 / 每3-5章1中爽 / 每卷1大爽。
# 数据参考(⚠️单一来源,medium)：追读top10%作品约每1.8章一次情绪高峰；连续3章"平路"追读开始掉。
sao_schedule:
  - chapter: 0
    type: ""                 # 打脸 | 装逼 | 升级 | 扮猪吃虎 | 真相揭晓 | 情感兑现 …
    level: ""                # 小爽 | 中爽 | 大爽
    setup_chain: ""          # 需求建立→压抑→释放 的链条一句话（验"信息差→期待→兑现"）

# ---- 自检（driver/脚本每卷跑）----
# - 连续 N 章无任何 sao_schedule 条目 → "平路过长"预警
# - 存在 released=false 且 duration_chapters 过大 → "虐点久未补偿"预警
# - release_intensity < intensity → "释放不够解气"预警
