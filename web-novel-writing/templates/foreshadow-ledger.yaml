# ============================================================
# 04 · 伏笔台账 (foreshadow-ledger.yaml)
# ============================================================
# 独立状态机。【绝不能塞进剧情线散文里】——"埋了忘回收=烂尾"是一票否决毒点，
# 这是 pipeline 里最纯粹可自动化的台账（埋设登记 → 状态流转 → 临近回收章自动提醒）。
# 铁律：别把伏笔当钩子用（埋时无需读者立刻注意到）；打开的循环必须有计划回收章。
# ============================================================

foreshadows:
  - id: F001
    type: ""                 # 身份 | 语言 | 场景 | 数字 | 主题 | 物件
    text: ""                 # 埋的是什么（一句话）
    planted_ch: 0            # 埋设章节
    planned_payoff_ch: 0     # 计划回收章节（必填，没有计划=别埋）
    status: open             # open(已埋) | 微回应(中途呼应过) | closed(已回收)
    visible_payoff_volume: 0 # 回收时机所在卷（与剧透红线对齐）
    note: ""                 # 回收时希望达到的效果（"啊原来如此"）

# ---- 健康度自检（脚本可机检；driver 每卷边界跑一次）----
# - aging 预警：当前章 > planned_payoff_ch 仍 open → 逾期未回收（烂尾风险）
# - 临近提醒：当前章接近 planned_payoff_ch → 提示本卷该回收
# - 密度告警：open 数量 >> closed 数量且持续上升 → "伏笔密度超过闭合速度"（崩铁翁法罗斯式翻车）
